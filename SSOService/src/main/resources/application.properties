server.port=8000

spring.application.name=SSOService

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
spring.security.oauth2.authorizationserver.issuer-url=http://localhost:8000
spring.security.oauth2.authorizationserver.introspection-endpoint=/oauth2/token-info

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0

spring.datasource.url=jdbc:postgresql://localhost:5432/user_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.by.bsuir.ssoservice=DEBUG
logging.level.org.springframework.security=DEBUG

oauth.yandex.client-id=${YANDEX_OAUTH_CLIENT_ID:}
oauth.yandex.client-secret=${YANDEX_OAUTH_CLIENT_SECRET:}
oauth.yandex.redirect-uri=${YANDEX_OAUTH_REDIRECT_URI:http://localhost:8765/api/oauth/callback/yandex}

oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
oauth.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
oauth.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8765/api/oauth/callback/google}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

eureka.instance.prefer-ip-address=true

eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true


app.security.jwt.access-ttl-seconds=14400
app.security.jwt.refresh-ttl-seconds=2592000
