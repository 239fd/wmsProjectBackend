plugins {
    id 'java'
    id 'jacoco'
    id 'com.diffplug.spotless' version '6.25.0'
}

jacoco {
    toolVersion = '0.8.11'
}

group = 'by.bsuir'
version = '1.0-SNAPSHOT'

allprojects {
    repositories {
        mavenCentral()
    }

    apply plugin: 'com.diffplug.spotless'

    spotless {
        java {
            target 'src*.java'
            googleJavaFormat('1.17.0').aosp().reflowLongStrings()
            removeUnusedImports()
            trimTrailingWhitespace()
            endWithNewline()
            indentWithSpaces(4)
            formatAnnotations()
        }
    }
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'checkstyle'
    apply plugin: 'jacoco'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.release = 21
        options.encoding = 'UTF-8'
        options.compilerArgs += ['-Xlint:all', '-Xlint:-serial']
    }

    checkstyle {
        toolVersion = '10.12.5'
        configFile = rootProject.file('config/checkstyle/checkstyle.xml')
        ignoreFailures = true
        showViolations = true
    }

    tasks.withType(Checkstyle) {
        reports {
            xml.required = false
            html.required = true
        }
    }

    jacoco {
        toolVersion = '0.8.11'
    }

    test {
        useJUnitPlatform()
        finalizedBy jacocoTestReport
    }

    jacocoTestReport {
        dependsOn test
        reports {
            xml.required = true
            html.required = true
            csv.required = false
        }
    }

    jacocoTestCoverageVerification {
        violationRules {
            rule {
                limit {
                    minimum = 0.50
                }
            }
        }
    }
}


def codeQualityServices = [
    'document-service',
    'product-service',
    'warehouse-service',
    'organization-service',
    'SSOService'
]

tasks.register('allCodeQuality') {
    group = 'verification'
    description = 'Run code quality checks (spotless, pmd, spotbugs, cpd) for all services'

    doFirst {
        println """
╔════════════════════════════════════════════════════════════════╗
║     WMS Project - Running Code Quality Checks for All Services ║
╚════════════════════════════════════════════════════════════════╝
        """.stripIndent()
    }

    dependsOn codeQualityServices.findAll { project(":$it") != null }
        .collect { ":${it}:codeQuality" }

    doLast {
        def summaryFile = file("build/reports/unified/code-quality-summary.txt")
        summaryFile.parentFile.mkdirs()

        summaryFile.text = """
WMS Project - Code Quality Summary
Generated: ${new Date()}
================================================================

Services Checked: ${codeQualityServices.size()}
${codeQualityServices.collect { "  - $it" }.join('\n')}

================================================================
Reports Location: build/reports/unified/

Individual Service Reports:
${codeQualityServices.collect { "  - $it: $it/build/reports/" }.join('\n')}

================================================================
Tools Used:
  - Spotless - Code formatting
  - PMD - Static analysis
  - CPD - Copy-paste detection
  - SpotBugs - Bug detection
  - Modernizer - Legacy API detection
================================================================
        """.stripIndent()

        println """
╔════════════════════════════════════════════════════════════════╗
║              All Code Quality Checks Completed                 ║
╠════════════════════════════════════════════════════════════════╣
║ Summary: build/reports/unified/code-quality-summary.txt        ║
╚════════════════════════════════════════════════════════════════╝
        """.stripIndent()
    }
}

tasks.register('allSpotlessApply') {
    group = 'formatting'
    description = 'Apply code formatting for all services'

    dependsOn codeQualityServices.findAll { project(":$it") != null }
        .collect { ":${it}:spotlessApply" }

    doLast {
        println """
╔════════════════════════════════════════════════════════════════╗
║         Code Formatting Applied to All Services                ║
╚════════════════════════════════════════════════════════════════╝
        """.stripIndent()
    }
}

tasks.register('allSpotlessCheck') {
    group = 'verification'
    description = 'Check code formatting for all services'

    dependsOn codeQualityServices.findAll { project(":$it") != null }
        .collect { ":${it}:spotlessCheck" }
}

tasks.register('allTestWithCoverage') {
    group = 'verification'
    description = 'Run all tests with JaCoCo coverage for all services'

    dependsOn codeQualityServices.findAll { project(":$it") != null }
        .collect { ":${it}:test" }

    finalizedBy codeQualityServices.findAll { project(":$it") != null }
        .collect { ":${it}:jacocoTestReport" }
    finalizedBy 'jacocoAggregateReport'

    doLast {
        println ""
        println "================================================================"
        println "  All Tests Completed with Coverage Reports"
        println "----------------------------------------------------------------"
        println "  Per-service: */build/reports/jacoco/test/html/index.html"
        println "  Aggregate:   build/reports/jacoco/aggregate/html/index.html"
        println "================================================================"
    }
}

tasks.register('allIntegrationTest') {
    group = 'verification'
    description = 'Run Testcontainers-backed integration tests for all services (requires Docker daemon).'

    dependsOn codeQualityServices.findAll { project(":$it") != null }
        .findAll { project(":$it").tasks.findByName('integrationTest') != null }
        .collect { ":${it}:integrationTest" }

    doLast {
        println ""
        println "================================================================"
        println "  Integration Tests Completed (Testcontainers)"
        println "================================================================"
    }
}

tasks.register('jacocoAggregateReport', JacocoReport) {
    group = 'verification'
    description = 'Aggregate JaCoCo coverage across all included business services into a single report'

    def aggregateProjects = codeQualityServices.findAll { project(":$it") != null }
        .collect { project(":$it") }

    dependsOn aggregateProjects.collect { "${it.path}:test" }

    additionalSourceDirs.from = files(aggregateProjects.collect { it.sourceSets.main.allSource.srcDirs })
    sourceDirectories.from   = files(aggregateProjects.collect { it.sourceSets.main.allSource.srcDirs })
    classDirectories.from    = files(aggregateProjects.collect { it.sourceSets.main.output })
    executionData.from       = files(aggregateProjects.collect { "${it.layout.buildDirectory.get()}/jacoco/test.exec" })
            .filter { it.exists() }

    reports {
        xml.required = true
        html.required = true
        csv.required = false
        xml.outputLocation = layout.buildDirectory.file("reports/jacoco/aggregate/jacoco.xml")
        html.outputLocation = layout.buildDirectory.dir("reports/jacoco/aggregate/html")
    }
}

tasks.register('allCheck') {
    group = 'verification'
    description = 'Run all tests and code quality checks for all services'

    dependsOn 'allTestWithCoverage', 'allCodeQuality'

