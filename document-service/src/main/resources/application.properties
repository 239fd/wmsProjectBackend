spring.application.name=document-service
server.port=8040

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true

logging.level.by.bsuir.documentservice=DEBUG

# RPA channel — Python rpa-service (FastAPI, host Windows). См. backend/rpa-service/README.md.
# При mode=rpa document-service зовёт Python; при сбое — fallback на Apache POI.
rpa.python.enabled=${RPA_PYTHON_ENABLED:true}
rpa.python.base-url=${RPA_PYTHON_BASE_URL:http://localhost:8060}
rpa.python.timeout-seconds=${RPA_PYTHON_TIMEOUT:120}

# Шаблоны Apache POI (mode=auto). Имена-файлов кириллические, поэтому хранятся в
# отдельном rpa.properties (ISO-8859-1 escapes). Defaults в RpaProperties.Templates
# совпадают со значениями в файле — конфиг опциональный.
spring.config.import=optional:classpath:rpa.properties
