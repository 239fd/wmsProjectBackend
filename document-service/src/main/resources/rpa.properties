# =======================================================================
# RPA configuration — все переменные, связанные с RPA-каналом генерации
# и (в будущем) с парсингом 1С.
# Можно переопределить через переменные окружения (env-vars указаны в [...])
# или через -Drpa.<key>=... в командной строке.
# =======================================================================

# --- RPA-2 Office bot (WinAppDriver / Selenium 4 на локальный MS Office) ---
# По умолчанию выключен — иначе старт document-service в Docker (Linux) упадёт.
rpa.office.enabled=${RPA_OFFICE_ENABLED:true}
rpa.office.driver-url=${RPA_OFFICE_DRIVER_URL:http://127.0.0.1:4723}
rpa.office.excel-exe=${RPA_OFFICE_EXCEL_EXE:C:\\Program Files\\Microsoft Office\\root\\Office16\\EXCEL.EXE}
rpa.office.word-exe=${RPA_OFFICE_WORD_EXE:C:\\Program Files\\Microsoft Office\\root\\Office16\\WINWORD.EXE}
rpa.office.downloads-dir=${RPA_OFFICE_DOWNLOADS_DIR:logs/rpa-office}
rpa.office.wait-seconds=${RPA_OFFICE_WAIT_SECONDS:20}

# --- Шаблоны документов (имена файлов в templates.dir) ---
# templates.dir — относительный путь, ищется от cwd document-service,
# затем как fallback ClassPathResource.
rpa.templates.dir=${RPA_TEMPLATES_DIR:document-service/documents template/}
rpa.templates.receipt-order=${RPA_TEMPLATE_RECEIPT_ORDER:Приходной ордер.XLS}
rpa.templates.revaluation-act=${RPA_TEMPLATE_REVALUATION:акт переоценки.xls}
rpa.templates.inventory-report=${RPA_TEMPLATE_INVENTORY:инвентарихационная опись.xls}
rpa.templates.write-off-act=${RPA_TEMPLATE_WRITEOFF:списание.docx}
rpa.templates.waybill=${RPA_TEMPLATE_WAYBILL:ттнls.xls}
rpa.templates.waybill-horizontal=${RPA_TEMPLATE_WAYBILL_HOR:ttn-gor.xls}
rpa.templates.waybill-vertical=${RPA_TEMPLATE_WAYBILL_VERT:ttn-vert.xls}
rpa.templates.receipt-act-normal=${RPA_TEMPLATE_RECEIPT_ACT:Акт приемки.RTF}
rpa.templates.receipt-act-discrepancy=${RPA_TEMPLATE_RECEIPT_DISCR:Акт расхождения.xls}
rpa.templates.invoice=${RPA_TEMPLATE_INVOICE:blank-invojs.doc}
rpa.templates.transport-note-horizontal=${RPA_TEMPLATE_TN_HOR:tn-gor.xls}
rpa.templates.transport-note-vertical=${RPA_TEMPLATE_TN_VERT:tn-vert.xls}
rpa.templates.cmr=${RPA_TEMPLATE_CMR:CMR Международная товарно-транспортная накладная.doc}

# --- RPA-1 1С толстый клиент (WinAppDriver, read-only парсинг) ---
# Эта секция читается product-service (см. backend/product-service/src/main/resources/rpa.properties).
# Здесь дублируется для документации. По умолчанию выключен — ждёт доступа к 1С.
rpa.onec.enabled=${RPA_ONEC_ENABLED:false}
rpa.onec.executable=${RPA_ONEC_EXECUTABLE:C:\\Program Files\\1cv8\\common\\1cestart.exe}
rpa.onec.base-connection=${RPA_ONEC_BASE_CONNECTION:}
rpa.onec.username=${RPA_ONEC_USERNAME:}
rpa.onec.password=${RPA_ONEC_PASSWORD:}
rpa.onec.journal-name=${RPA_ONEC_JOURNAL:Поступление товаров и услуг}
