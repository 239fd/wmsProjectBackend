# =======================================================================
# RPA-1 1С толстый клиент (read-only парсинг через WinAppDriver).
# .properties читается ISO-8859-1, поэтому кириллица в \uXXXX-escapes.
# Чтобы прочитать: native2ascii -reverse rpa.properties.
# =======================================================================

rpa.onec.enabled=${RPA_ONEC_ENABLED:true}
rpa.onec.driver-url=${RPA_ONEC_DRIVER_URL:http://127.0.0.1:4723}
rpa.onec.executable=${RPA_ONEC_EXECUTABLE:D:\\1C\\8.3.27.1688\\bin\\1cv8ct.exe}

# C:\Users\pavel\OneDrive\Документы\utdemo
rpa.onec.base-path=${RPA_ONEC_BASE_PATH:C:\\Users\\pavel\\OneDrive\\Документы\\utdemo}

# Администратор (ФедоровБМ)
rpa.onec.username=${RPA_ONEC_USERNAME:Администратор (ФедоровБМ)}

rpa.onec.password=${RPA_ONEC_PASSWORD:}

# Закупки
rpa.onec.section-name=${RPA_ONEC_SECTION:Закупки}

# Заказы поставщикам
rpa.onec.journal-name=${RPA_ONEC_JOURNAL:Заказы поставщикам}

rpa.onec.wait-seconds=${RPA_ONEC_WAIT:30}

# attach-mode=true → бот ищет уже открытое окно 1С (запускаешь 1С руками до Postman)
# attach-mode=false → бот сам запускает 1cv8ct.exe (исходный режим)
rpa.onec.attach-mode=${RPA_ONEC_ATTACH:true}
# Шаблон имени окна 1С (для поиска через Root-session). По умолчанию ищем по подстроке "1С"
rpa.onec.window-title-pattern=${RPA_ONEC_WINDOW_TITLE:1С}

